name: CI

on:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next build
        env:
          VELA_ADMIN_TOKEN: ${{ secrets.VELA_ADMIN_TOKEN }}
          NEXT_PUBLIC_VELA_BASE: ${{ secrets.NEXT_PUBLIC_VELA_BASE }}

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd backend && pip install -r requirements.txt
      - run: cd backend && python -m py_compile main.py
